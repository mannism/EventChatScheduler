name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-engines

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
      - name: Verify release commit pushed to main
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read state via gh api — git remotes have been reconfigured by
          # @semantic-release/git and the checkout's auth header is no longer
          # in effect (persist-credentials: false), so plain `git fetch` fails.
          MAIN_VERSION=$(gh api "repos/${{ github.repository }}/contents/package.json?ref=main" --jq '.content' | base64 -d | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).version")
          LATEST_TAG=$(gh api "repos/${{ github.repository }}/releases/latest" --jq '.tag_name' 2>/dev/null | sed 's/^v//' || echo "")
          if [ -n "$LATEST_TAG" ] && [ "$MAIN_VERSION" != "$LATEST_TAG" ]; then
            echo "::error::Release inconsistency: package.json @ main = $MAIN_VERSION, latest tag = $LATEST_TAG"
            exit 1
          fi
